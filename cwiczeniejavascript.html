<form>
    <input type="text" id="pole"> <br>
    <input type="button" value="Sprawdź wynik" onclick="opcje()">
    <p id="wynik"></p>
    <p id="wynik2"></p>
    <script>
        function opcje() {
            let wartosc = document.getElementById('pole').value;
            let p = document.getElementById('wynik');
            let p2 = document.getElementById('wynik2');
            if (wartosc == "abcd") {
                p.innerText = "Opcja 1";
            } else if (wartosc == "xyz") {
                p.innerText = "Opcja 2";
            } else {
                p.innerText = "Opcja 3";
            }
            switch (wartosc) {
                case "abcd":
                    p2.innerText = "Opcja 1";
                    break;
                case "xyz":
                    p2.innerText = "Opcja 2";
                    break;
                default:
                    p2.innerText = "Opcja 3";
                    break;
            }
        }
    </script>
</form>
