<h3>Oblicz miesięczną ratę</h3>
<form>
    <input type="checkbox" id="react" value="react">
    <label for="react">Kurs React.js</label><br>
    <input type="checkbox" id="js" value="js">
    <label for="js">Kurs JavaScript</label><br>
    <label for="raty">Liczba rat: </label>
    <input type="number" id="raty" min="1" value="1"><br>
    <select id="miasto">
        <option value="Warszawa">Warszawa</option>
        <option value="Katowice">Katowice</option>
        <option value="Gdańsk">Gdańsk</option>
    </select><br><br>
    <input type="button" value="Oblicz" onclick="obliczRate()">
    <p id="wynik"></p>
</form>
<script>
    function obliczRate() {
        const kursReact = document.getElementById('react').checked;
        const kursJS = document.getElementById('js').checked;
        const liczbaRat = parseInt(document.getElementById('raty').value);
        const miasto = document.getElementById('miasto').value;
        const wynik = document.getElementById('wynik');

        
        const ceny = {
            react: 5000,
            js: 3000
        };

        
        if ((!kursReact && !kursJS) || isNaN(liczbaRat) || liczbaRat < 1) {
            wynik.innerText = "Wybierz kurs i podaj poprawną liczbę rat.";
            return;
        }

        let koszt = 0;
        if (kursReact) koszt += ceny.react;
        if (kursJS) koszt += ceny.js;

        const rata = Math.round(koszt / liczbaRat);

        wynik.innerText = `Kurs odbędzie się w ${miasto}. Koszt całkowity: ${koszt} zł. Płacisz ${liczbaRat} rat po ${rata} zł`;
    }
    </script>
